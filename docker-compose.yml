version: '3.8'

services:
  # Local PostgreSQL for development
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: farmshare_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/supabase/migrations:/docker-entrypoint-initdb.d

  # Redis for caching (development)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Local backend development
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/farmshare_dev
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data: